<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>běhna 2‰ — zúčastníš se?</title>
  <meta name="description" content="Běh na dvě promile. 8. července · 2 promile · Stromovka. Zúčastníš se?" />

  <!-- Open Graph so the link looks good when shared -->
  <meta property="og:title" content="běhna 2‰ — zúčastníš se?" />
  <meta property="og:description" content="Piješ, dokud nemáš 2 promile. Pak běžíš 2 km. Zúčastníš se?" />
  <meta property="og:image" content="posteBEHkipchoge.png" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Film-grain / noise overlay -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)" />
  </svg>

  <main class="stage">
    <!-- Corner detail block, straight off the poster -->
    <div class="meta">
      <span>8července</span>
      <span>2promile</span>
      <span>5tromovka</span>
    </div>

    <header class="wordmark" aria-hidden="true">
      <span class="wordmark__top">běhna</span>
      <span class="wordmark__bottom">2‰</span>
    </header>

    <!-- SCREEN 1: the question -->
    <section class="screen screen--ask" id="screen-ask">
      <h1 class="prompt">zúčastníš se?</h1>
      <div class="buttons">
        <button type="button" class="btn btn--yes" id="btnYes">samozřejmě</button>
        <button type="button" class="btn btn--no" id="btnNo">sorry ale ne</button>
      </div>
      <p class="taunt" id="taunt" aria-live="polite"></p>
    </section>

    <!-- SCREEN 2: name entry -->
    <section class="screen screen--name is-hidden" id="screen-name">
      <h2 class="prompt prompt--sm" id="nameHeading">jak se jmenuješ?</h2>
      <form class="name-form" id="nameForm" novalidate>
        <input
          type="text"
          id="nameInput"
          class="name-input"
          placeholder="tvoje jméno"
          autocomplete="name"
          maxlength="60"
          required
        />
        <button type="submit" class="btn btn--yes" id="submitBtn">jdu do toho</button>
      </form>
      <p class="err" id="nameErr" aria-live="polite"></p>
    </section>

    <!-- SCREEN 3: done -->
    <section class="screen screen--done is-hidden" id="screen-done">
      <h2 class="prompt" id="doneHeading">jsi na startovní listině.</h2>
      <p class="done-sub" id="doneSub">Připravíme pro tebe Zubrowku 🍯</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
